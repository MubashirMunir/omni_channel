<!DOCTYPE html>
<html>

<head>

    <!-- Base -->
    <base href="$FLUTTER_BASE_HREF">

    <!-- Charset -->
    <meta charset="UTF-8">

    <!-- Responsive Fix -->
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Browser Compatibility -->
    <meta
            http-equiv="X-UA-Compatible"
            content="IE=Edge"
    >

    <!-- SEO -->
    <meta
            name="description"
            content="Elite CRM - Omni Channel SaaS CRM"
    >

    <!-- Mobile -->
    <meta
            name="mobile-web-app-capable"
            content="yes"
    >

    <meta
            name="apple-mobile-web-app-capable"
            content="yes"
    >

    <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black"
    >

    <meta
            name="apple-mobile-web-app-title"
            content="Elite CRM"
    >

    <!-- Theme Color -->
    <meta
            name="theme-color"
            content="#111827"
    >

    <!-- Disable Auto Translation -->
    <meta
            name="google"
            content="notranslate"
    >

    <!-- Favicon -->
    <link
            rel="icon"
            type="image/png"
            href="favicon.png"
    />

    <!-- Apple Icon -->
    <link
            rel="apple-touch-icon"
            href="icons/Icon-192.png"
    >

    <!-- Manifest -->
    <link
            rel="manifest"
            href="manifest.json"
    >

    <!-- Title -->
    <title>Elite CRM</title>

    <!-- Smooth Font Rendering -->
    <style>

        html,
        body {
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;

          overflow: hidden;

          background: #F5F7FB;

          text-rendering: optimizeLegibility;

          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;

          font-smooth: always;
        }

        body {
          overscroll-behavior: none;
        }

    </style>

</head>

<body>

<!-- Flutter Bootstrap -->
<script
        src="flutter_bootstrap.js"
        async>
</script>

</body>

</html>
